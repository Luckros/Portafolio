<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas</title>
</head>
<body>
    <main class="contenedor-app">
        <header>
            <h1>Mis tareas</h1>
            <div class="input-grupo">
                <input type="text" id="input-tarea" placeholder="¿Qué necesitas hoy?">
                <button id="btn-agregar">Añadir</button>
            </div>
        </header>
        <ul id="lista-tareas">
            <li class="tarea">
                <span class="texto"> Reunion con mi hermana para definir clientes de la agencia</span>
                <button class="btn-borrar">❌</button>
            </li>
        </ul>
    </main>
</body>
</html>
